<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" role="img" aria-labelledby="title desc">
  <title id="title">Nix Holy Trinity</title>
  <desc id="desc">NixLang, Nix CLI, and NixOS slash nixpkgs as three concerns around Nix.</desc>

  <defs>
    <style>
      text {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 700;
        fill: #eaf1ff;
      }
      .edge {
        stroke: #6f7f95;
        stroke-width: 8;
        stroke-linecap: round;
      }
      .node {
        stroke-width: 6;
      }
    </style>
  </defs>

  <g>
    <line class="edge" x1="550" y1="170" x2="250" y2="620" />
    <line class="edge" x1="550" y1="170" x2="850" y2="620" />
    <line class="edge" x1="250" y1="620" x2="850" y2="620" />

    <line class="edge" x1="550" y1="470" x2="550" y2="170" />
    <line class="edge" x1="550" y1="470" x2="250" y2="620" />
    <line class="edge" x1="550" y1="470" x2="850" y2="620" />
  </g>

  <g text-anchor="middle">
    <circle class="node" cx="550" cy="170" r="134" fill="#1f2f47" stroke="#9eb5d4" />
    <text x="550" y="192" font-size="48">NixLang</text>

    <circle class="node" cx="250" cy="620" r="134" fill="#2f3b23" stroke="#b8d48f" />
    <text x="250" y="642" font-size="54">Nix CLI</text>

    <circle class="node" cx="850" cy="620" r="134" fill="#3a283e" stroke="#d0a7db" />
    <text x="850" y="602" font-size="50">NixOS</text>
    <text x="850" y="670" font-size="50">nixpkgs</text>

    <circle class="node" cx="550" cy="470" r="72" fill="#111827" stroke="#d9e4fb" />
    <text x="550" y="490" font-size="53">Nix</text>
  </g>
</svg>
